<!DOCTYPE html>
<html>
<head>
    <title>Game Start</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="{{ url_for('static', filename='Script.js') }}" defer></script>
</head>
<body>

    <div class="section">
        <h1>{{ name }} has entered the battlefield!</h1>
        <p><strong>Health:</strong> <span id="player-health">{{ health }} / {{ max_health }}</span></p>
    </div>

    <div class="section">
        <h3>Attack with an ability:</h3>
        <div id="ability-buttons">
            {% for ability in abilities %}
                <button onclick="useAbility('{{ ability }}')">{{ ability }}</button><br>
            {% endfor %}
        </div>
    </div>

    <hr>

    <div class="section">
        <h2>Enemy: {{ enemy_name }}</h2>
        <p><strong>Health:</strong> <span id="enemy-health">{{ enemy_health }} / {{ enemy_max_health }}</span></p>
    </div>

    <div class="section" id="combat-log">
        <h3>Combat Log:</h3>
        <div id="log-messages" style="white-space: pre-wrap; background: #f1f1f1; padding: 10px; border-radius: 5px;"></div>
    </div>

</body>
</html>
