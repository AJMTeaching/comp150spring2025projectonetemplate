<!DOCTYPE html>
<html>
<head>
    <title>Choose Your Next Zone</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #fefefe;
            margin-top: 60px;
        }
        .container {
            display: inline-block;
            background-color: #f9f9f9;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 20px;
            color: #444;
        }
        button {
            padding: 10px 25px;
            margin: 10px 0;
            font-size: 1.1rem;
            border-radius: 8px;
            border: none;
            background-color: #4caf50;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Select Your Next Location</h1>
        <form action="/enter-location" method="POST">
            {% for location in locations %}
                <button type="submit" name="location" value="{{ location }}">{{ location }}</button><br>
            {% endfor %}
        </form>
    </div>

</body>
</html>
