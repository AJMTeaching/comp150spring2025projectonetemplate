<!DOCTYPE html>
<html>
<head>
    <title>Choose Your Next Zone</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #fffdf5;
            color: #333;
            margin-top: 60px;
        }
        .container {
            display: inline-block;
            background-color: #fefae0;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 0 12px rgba(0, 0, 0, 0.1);
        }
        h1 {
            font-size: 2.4rem;
            margin-bottom: 25px;
            color: #5e6472;
        }
        button {
            padding: 12px 30px;
            margin: 12px 0;
            font-size: 1.2rem;
            border-radius: 8px;
            border: none;
            background-color: #4caf50;
            color: white;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🌍 Choose Your Next Mission Zone</h1>
        <form action="/enter-location" method="POST">
            {% for location in locations %}
                <button type="submit" name="location" value="{{ location }}">{{ location }}</button><br>
            {% endfor %}
        </form>
    </div>

</body>
</html>
