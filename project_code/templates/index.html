<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Exploding Kittens RPG</title>
    
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="{{ url_for('static', filename='Script.js') }}" defer></script>

    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 40px;
            background-color: #fffdf5;
            color: #333;
            text-align: center;
        }

        h1 {
            font-size: 32px;
            color: #444;
        }

        p {
            font-size: 18px;
            margin-bottom: 30px;
        }

        form {
            display: inline-block;
            text-align: left;
            background: #fefae0;
            padding: 30px 40px;
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        label {
            display: block;
            font-size: 16px;
            margin-bottom: 15px;
        }

        button {
            display: block;
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            font-size: 18px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>

    <h1>🐱 Welcome to <em>Exploding Kittens: The Web RPG</em></h1>
    <p>Choose your feline champion and begin the mission to save the colony!</p>

    <form action="/choose-character" method="post">
        <label><input type="radio" name="character" value="wizard" required> 🧙‍♂️ <strong>Wizard Cat</strong> – Arcane master of the whisker realm.</label>
        <label><input type="radio" name="character" value="feral"> 🐾 <strong>Feral Cat</strong> – Wild and ruthless from the alleyways.</label>
        <label><input type="radio" name="character" value="exploding"> 💥 <strong>Exploding Kitten</strong> – Unpredictable chaos with a boom.</label>
        
        <button type="submit">🎮 Start Game</button>
    </form>

</body>
</html>
